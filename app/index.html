<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BeerHouse Master Buyer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Barlow+Condensed:wght@700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap');
      body {
        font-family: 'Inter', sans-serif;
        background-color: #0f172a;
        color: #e2e8f0;
      }
      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #1e293b;
      }
      ::-webkit-scrollbar-thumb {
        background: #475569;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #64748b;
      }
      /* Ticker / marquee animation */
      @keyframes ticker-scroll {
        0%   { transform: translateX(0); }
        100% { transform: translateX(-50%); }
      }
      .ticker-wrap:hover .ticker-inner {
        animation: ticker-scroll 8s linear infinite;
      }
      /* Login screen — typography */
      .font-display { font-family: 'Barlow Condensed', sans-serif; }
      .font-body    { font-family: 'DM Sans', sans-serif; }
      /* Login screen — amber grid texture */
      .login-grid {
        background-image:
          linear-gradient(rgba(245,158,11,0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(245,158,11,0.035) 1px, transparent 1px);
        background-size: 52px 52px;
      }
      /* Login screen — staggered entrance */
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(14px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .login-anim { opacity: 0; animation: fadeUp 0.55s cubic-bezier(0.22,1,0.36,1) forwards; }
      .login-anim-1 { animation-delay: 0.05s; }
      .login-anim-2 { animation-delay: 0.18s; }
      .login-anim-3 { animation-delay: 0.32s; }
      .login-anim-4 { animation-delay: 0.46s; }
      .login-anim-5 { animation-delay: 0.60s; }
      .login-anim-6 { animation-delay: 0.74s; }
    </style>
